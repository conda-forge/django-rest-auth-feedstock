{% set name = "django-rest-auth" %}
{% set version = "0.9.5" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/django-rest-auth-{{ version }}.tar.gz
  sha256: f11e12175dafeed772f50d740d22caeab27e99a3caca24ec65e66a8d6de16571

build:
  number: 2
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - django >=1.8.0
    - djangorestframework >=3.1.3
    - python >={{ python_min }}
    - six >=1.9.0

test:
  imports:
    - rest_auth
    - rest_auth.registration
    - rest_auth.tests
  requires:
    - django-allauth >=0.25.0
    - djangorestframework-jwt >=1.9.0
    - responses >=0.5.0
    - pip
    - python {{ python_min }}
  commands:
    - pip check

about:
  home: http://github.com/Tivix/django-rest-auth
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Create a set of REST API endpoints for Authentication and Registration

extra:
  recipe-maintainers:
    - bgruening
